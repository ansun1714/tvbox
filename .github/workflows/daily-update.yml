name: Daily TVBox Asia Update

on:
  schedule:
    - cron: '0 0 * * *'     # 每天 UTC 0:00（北京时间早上8点）
  workflow_dispatch:        # 允许手动触发测试

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行抓取脚本
        run: python scripts/scraper.py
      
      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-private-api.json
          git commit -m "Daily auto update: $(date -u)" || echo "No changes"
          git push
